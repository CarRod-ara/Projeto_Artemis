<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#667eea">
    <meta name="description" content="Sistema Artemis - Gestão de Vendas Doçuras de Artemis">
    <title>Artemis - Painel de Vendas</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    <link rel="icon" type="image/svg+xml" href="icons/icon.svg">
    <link rel="apple-touch-icon" href="icons/icon.svg">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        /* Custom styles beyond Tailwind */
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .card-shadow {
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        
        .progress-gradient {
            background: linear-gradient(90deg, #f6ad55 0%, #d4a574 50%, #48bb78 100%);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .modal-enter {
            animation: slideUp 0.3s ease;
        }
        
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .tab-active {
            border-bottom: 3px solid #667eea;
            color: #667eea;
        }
        
        /* Hide scrollbar but allow scrolling */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        /* Touch-friendly inputs */
        input, select, textarea, button {
            font-size: 16px; /* Prevents zoom on iOS */
        }
        
        /* Offline indicator */
        .offline-indicator {
            display: none;
        }
        .offline .offline-indicator {
            display: flex;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- Offline Indicator -->
    <div class="offline-indicator fixed top-0 left-0 right-0 bg-yellow-500 text-white text-center py-2 z-50 text-sm font-medium">
        ⚠️ Modo Offline - Dados salvos localmente
    </div>

    <!-- App Container -->
    <div id="app" class="max-w-md mx-auto bg-gray-50 min-h-screen pb-20">
        
        <!-- Header -->
        <header class="gradient-bg text-white p-4 sticky top-0 z-40">
            <div class="flex justify-between items-center">
                <div>
                    <h1 class="text-xl font-bold">Artemis</h1>
                    <p class="text-sm opacity-80" id="currentDate">Carregando...</p>
                </div>
                <div class="flex gap-2">
                    <button onclick="app.syncData()" class="p-2 bg-white/20 rounded-lg hover:bg-white/30 transition" title="Sincronizar">
                        🔄
                    </button>
                    <button onclick="app.exportData()" class="p-2 bg-white/20 rounded-lg hover:bg-white/30 transition" title="Exportar">
                        💾
                    </button>
                    <button onclick="app.openSettings()" class="p-2 bg-white/20 rounded-lg hover:bg-white/30 transition" title="Configurações">
                        ⚙️
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Content Area -->
        <main id="mainContent" class="p-4 space-y-4">
            <!-- Content loaded dynamically -->
        </main>

        <!-- Bottom Navigation -->
        <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 max-w-md mx-auto">
            <div class="flex justify-around py-2">
                <button onclick="app.navigate('dashboard')" class="nav-btn flex flex-col items-center p-2 text-gray-500" data-page="dashboard">
                    <span class="text-xl">📊</span>
                    <span class="text-xs mt-1">Dashboard</span>
                </button>
                <button onclick="app.navigate('registrar')" class="nav-btn flex flex-col items-center p-2 text-gray-500" data-page="registrar">
                    <span class="text-xl">📝</span>
                    <span class="text-xs mt-1">Registrar</span>
                </button>
                <button onclick="app.navigate('fiados')" class="nav-btn flex flex-col items-center p-2 text-gray-500" data-page="fiados">
                    <span class="text-xl">👥</span>
                    <span class="text-xs mt-1">Fiados</span>
                </button>
                <button onclick="app.navigate('relatorios')" class="nav-btn flex flex-col items-center p-2 text-gray-500" data-page="relatorios">
                    <span class="text-xl">📈</span>
                    <span class="text-xs mt-1">Relatórios</span>
                </button>
            </div>
        </nav>
    </div>

    <!-- Modal Container -->
    <div id="modal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-end sm:items-center justify-center p-4">
        <div id="modalContent" class="bg-white rounded-2xl w-full max-w-md max-h-[90vh] overflow-y-auto modal-enter">
            <!-- Modal content loaded dynamically -->
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer" class="fixed top-20 left-1/2 transform -translate-x-1/2 z-50 space-y-2"></div>

    <!-- Scripts -->
    <script src="js/utils.js"></script>
    <!-- Scripts - ORDEM CORRETA -->
<script src="js/db.js"></script>
<script src="js/weather.js"></script>
<script src="js/mixEngine.js"></script>
<script src="js/health-check.js"></script>  <!-- DEPOIS do db.js -->
<script src="js/app.js"></script>

<script>
// Register Service Worker
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
            .then(reg => console.log('SW registered:', reg))
            .catch(err => console.log('SW registration failed:', err));
    });
}
</script>
</body>
</html>
